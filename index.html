<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Catamaran:wght@400;700&display=swap"
      rel="stylesheet"
    />

    <link rel="icon" href="./src/assets/scissors.svg" />

    <link rel="stylesheet" href="./src//styles/index.css" />

    <title>Hair Day</title>
  </head>
  <body>
    <div class="container">
      <img src="./src/assets/logo.svg" alt="Logo" class="logo" />

      <form class="form">
        <header>
          <h1>Schedule an appointment</h1>
          <p>
            Select a date, time, and enter the client's name to create the
            appointment
          </p>
        </header>

        <label for="date" class="label">Date</label>
        <div class="input">
          <i><img src="./src/assets/calendar.svg" alt="Calendar" /></i>
          <input type="date" id="date" name="date" required />
        </div>

        <span class="label">Times</span>
        <ul id="hours" class="hours" aria-label="Available times in the morning">
          <!-- Example: Morning
          <li data-period="morning" class="hour-period">Morning</li>
          <li data-period="morning" value="09:00" class="hour hour-available">
            09:00
          </li> -->
          <!-- Example: Afternoon
          <li data-period="afternoon" class="hour-period">Afternoon</li>
          <li
            data-period="afternoon"
            value="13:00"
            class="hour hour-unavailable"
          >
            13:00
          </li> -->
          <!-- Example: Evening
          <li data-period="evening" class="hour-period">Evening</li>

          <li data-period="evening" value="19:00" class="hour hour-available">
            19:00
          </li>-->
        </ul>

        <label for="customer" class="label">Customer</label>
        <div class="input">
          <i><img src="./src/assets/person.svg" alt="Customer" /></i>
          <input
            type="text"
            id="customer"
            name="customer"
            placeholder="Customer Name"
            required
          />
        </div>

        <button type="submit" class="button">Schedule</button>
      </form>

      <aside class="schedule">
        <header>
          <h1>Appointments</h1>
          <p>View appointments according to the selected day</p>
        </header>

        <section class="schedule-period">
          <header>
            <img src="./src/assets/morning.svg" alt="Morning" />
            <strong>Morning</strong>
            <span>09h-12h</span>
          </header>
          <ul id="period-morning" class="period">
            <!-- Example
            <li>
              <strong>11:00</strong>
              <span>Diego Ferreira</span>
              <img
                src="./src/assets/cancel.svg"
                alt="Cancel"
                class="cancel-icon"
              />
            </li>-->
          </ul>
        </section>

        <section class="schedule-period">
          <header>
            <img src="./src/assets/afternoon.svg" alt="Afternoon" />
            <strong>Afternoon</strong>
            <span>13h-18h</span>
          </header>
          <ul id="period-afternoon" class="period">
            <!-- Example
            <li>
              <strong>14:00</strong>
              <span>Diego Ferreira</span>
              <img
                src="./src/assets/cancel.svg"
                alt="Cancel"
                class="cancel-icon"
              />
            </li>-->
          </ul>
        </section>

        <section class="schedule-period">
          <header>
            <img src="./src/assets/night.svg" alt="Evening" />
            <strong>Evening</strong>
            <span>19h-21h</span>
          </header>
          <ul id="period-evening" class="period">
            <!-- Example
            <li>
              <strong>19:00</strong>
              <span>Diego Ferreira</span>
              <img
                src="./src/assets/cancel.svg"
                alt="Cancel"
                class="cancel-icon"
              />
            </li>-->
          </ul>
        </section>
      </aside>
    </div>
  </body>
</html>
